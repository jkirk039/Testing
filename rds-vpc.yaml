AWSTemplateFormatVersion: '2010-09-09'

Description: |
  AWS CloudFormation template to create a VPC named VPC-jeskir2485 in the us-west-2 region, designed to span at least three Availability Zones.

Resources:

  StudentVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC-jeskir2485

  PublicSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StudentVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet-us-west-2a

  PublicSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StudentVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-west-2b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet-us-west-2b

  PublicSubnetAZ3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StudentVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: us-west-2c
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet-us-west-2c

Outputs:

  VPCId:
    Description: ID of the created VPC
    Value: !Ref StudentVPC
    Export:
      Name: VPC-jeskir2485-ID

  VPCCidrBlock:
    Description: CIDR block of the created VPC
    Value: 10.0.0.0/16
    Export:
      Name: VPC-jeskir2485-CIDR